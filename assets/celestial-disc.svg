  </defs>

  <circle cx="110" cy="110" r="104" fill="url(#seal-ink)" stroke="#d6a84f" stroke-width="4"/>
  <circle cx="110" cy="110" r="86" fill="none" stroke="#d6a84f" stroke-width="2" stroke-dasharray="5 9"/>
  <circle cx="110" cy="110" r="60" fill="url(#seal-paper)" opacity="0.94"/>

  <g fill="#d6a84f">
    <circle cx="110" cy="30" r="4"/>
    <circle cx="157" cy="45" r="4"/>
    <circle cx="186" cy="86" r="4"/>
    <circle cx="186" cy="134" r="4"/>
    <circle cx="157" cy="175" r="4"/>
    <circle cx="110" cy="190" r="4"/>
    <circle cx="63" cy="175" r="4"/>
